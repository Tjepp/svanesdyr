[build]
  publish = "build"
  command = "npm run build"

# Image CDN rewrite - MUST be before SPA fallback
[[redirects]]
  from = "/img/*"
  to = "/.netlify/images?url=/images/:splat"
  status = 200

# Redirect non-www to www
[[redirects]]
  from = "https://svanesdyr.dk/*"
  to = "https://www.svanesdyr.dk/:splat"
  status = 301
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
